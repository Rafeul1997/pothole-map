<!DOCTYPE html>
<html>
<head>
  <title>Pothole Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOFZ8zjLw3S1UbG3R7w8OGEEaMxlyP8lg",
  databaseURL: "https://potholedetection-a2a3d-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map').setView([22.57, 88.36], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

db.ref("potholes").on("child_added", (snap) => {
  const data = snap.val();

  if (data.lat && data.lng) {
    L.marker([data.lat, data.lng])
      .addTo(map)
      .bindPopup("🚧 Pothole");
  }
});
</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</body>
</html>
